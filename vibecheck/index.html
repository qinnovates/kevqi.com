<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Check — kevqi.com</title>
    <meta name="description" content="The image you are looking for has been moved or deleted.">
    <meta name="robots" content="noindex">

    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #060810;
            --text: #E8ECED;
            --dim: rgba(255,255,255,0.25);
            --muted: rgba(255,255,255,0.08);
            --cyan: #00E5FF;
            --font: 'Inter', -apple-system, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* Broken image icon */
        .broken-img {
            width: 220px;
            height: 160px;
            border: 1px solid var(--muted);
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.5rem;
            background: rgba(255,255,255,0.015);
        }

        /* Landscape icon placeholder */
        .broken-img::before {
            content: '';
            width: 40px;
            height: 30px;
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 2px;
        }

        /* Sun circle in corner */
        .broken-img::after {
            content: '';
            position: absolute;
            top: 30px;
            left: 30px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.06);
        }

        /* Mountain shape */
        .broken-img .mountain {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 10px solid rgba(255,255,255,0.05);
        }

        .text-block {
            text-align: center;
            margin-bottom: 2rem;
        }

        .text-block p {
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255,255,255,0.15);
            line-height: 2.2;
        }

        .links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 3rem;
        }

        .links a {
            font-family: var(--mono);
            font-size: 0.75rem;
            font-weight: 300;
            color: rgba(0,229,255,0.3);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: rgba(0,229,255,0.1);
            transition: color 0.3s, text-decoration-color 0.3s;
            cursor: pointer;
        }

        .links a:hover {
            color: rgba(0,229,255,0.6);
            text-decoration-color: rgba(0,229,255,0.3);
        }

        /* Second broken image — smaller, more degraded */
        .broken-img-2 {
            width: 120px;
            height: 90px;
            border: 1px solid rgba(255,255,255,0.04);
            position: relative;
            margin-bottom: 2rem;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 8px,
                rgba(255,255,255,0.01) 8px,
                rgba(255,255,255,0.01) 16px
            );
        }

        .broken-img-2::before {
            content: '\00d7';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: rgba(255,255,255,0.04);
        }

        /* Attribution */
        .attribution {
            position: absolute;
            bottom: 2rem;
            font-family: var(--mono);
            font-size: 0.5rem;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.06);
            text-transform: uppercase;
        }

        /* Ambient background elements */
        .bg-line {
            position: fixed;
            background: rgba(255,255,255,0.01);
            pointer-events: none;
        }
        .bg-line:nth-child(1) { width: 1px; height: 40%; top: 10%; left: 20%; }
        .bg-line:nth-child(2) { width: 30%; height: 1px; top: 35%; right: 10%; }
        .bg-line:nth-child(3) { width: 1px; height: 25%; bottom: 15%; right: 30%; }

        /* Fade in */
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* The word that appears and disappears */
        .ghost-word {
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 300;
            color: rgba(255,255,255,0.04);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            margin-top: 1rem;
            animation: ghostAppear 10s ease-in-out infinite;
        }

        @keyframes ghostAppear {
            0%,30% { opacity: 0; }
            40%,60% { opacity: 1; }
            70%,100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-line"></div>
    <div class="bg-line"></div>
    <div class="bg-line"></div>

    <div class="content">
        <div class="broken-img">
            <div class="mountain"></div>
        </div>

        <div class="text-block">
            <p>The image you are looking for</p>
            <p>has been moved or deleted.</p>
        </div>

        <div class="links">
            <a href="/">Click here to go home.</a>
            <button onclick="location.reload()" style="background:none;border:none;color:inherit;font:inherit;cursor:pointer;padding:0;text-decoration:underline;">Click here to try again.</button>
            <button onclick="this.textContent='OK.'; this.style.color='rgba(255,255,255,0.06)'; this.style.textDecoration='none'; this.style.cursor='default';" style="background:none;border:none;color:inherit;font:inherit;cursor:pointer;padding:0;text-decoration:underline;">Click here to accept loss.</button>
        </div>

        <div class="broken-img-2"></div>

        <div class="ghost-word">still here</div>
    </div>

    <div class="attribution">STILL HERE &middot; 404 PORTRAIT &middot; 2050</div>
</body>
</html>
